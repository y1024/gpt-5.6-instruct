name: Cache Star History Image

on:
  schedule:
    # 03:17 and 15:17 UTC = 11:17 and 23:17 Asia/Shanghai
    - cron: "17 3,15 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cache-star-history.yml"

permissions:
  contents: write

concurrency:
  group: cache-star-history
  cancel-in-progress: false

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SVG-to-PNG converter
        run: python3 -m pip install --disable-pip-version-check cairosvg==2.7.1

      - name: Download Star History image
        id: download
        env:
          STAR_HISTORY_URL: https://api.star-history.com/svg?repos=MDX-Tom%2Fgpt-5.6-instruct&type=Date&legend=top-left
        run: |
          set +e
          http_code=$(curl \
            --location \
            --silent \
            --show-error \
            --retry 5 \
            --retry-delay 10 \
            --retry-all-errors \
            --connect-timeout 20 \
            --max-time 120 \
            --output /tmp/star-history.svg \
            --write-out "%{http_code}" \
            "$STAR_HISTORY_URL")
          curl_status=$?
          set -e

          if [ "$curl_status" -ne 0 ] || [ "$http_code" != "200" ]; then
            echo "Star History request did not succeed; retaining the cached PNG."
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! grep -Eq '<svg([[:space:]>])' /tmp/star-history.svg; then
            echo "Response is not an SVG; retaining the cached PNG."
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 - <<'PY'
          from pathlib import Path
          from xml.etree import ElementTree
          import cairosvg

          source = Path("/tmp/star-history.svg")
          ElementTree.parse(source)
          converted = Path("/tmp/star-history.png")
          cairosvg.svg2png(url=str(source), write_to=str(converted))
          if not converted.read_bytes().startswith(b"\x89PNG\r\n\x1a\n"):
              raise RuntimeError("Converted output is not a PNG")
          PY

          mkdir -p docs/images
          if [ -f docs/images/star-history.png ] && cmp -s /tmp/star-history.png docs/images/star-history.png; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mv /tmp/star-history.png docs/images/star-history.png
          echo "updated=true" >> "$GITHUB_OUTPUT"

      - name: Commit refreshed cache
        if: steps.download.outputs.updated == 'true'
        run: |
          if git diff --quiet -- docs/images/star-history.png; then
            echo "Cached Star History PNG is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/images/star-history.png
          git commit -m "docs: refresh cached star history"
          git push
